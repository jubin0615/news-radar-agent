# ============================================================
# 프로덕션 프로필: PostgreSQL + PgVectorStore
# 활성화: --spring.profiles.active=pgvector
# ============================================================

# PostgreSQL 데이터소스 (H2 대체)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:newsradar}
spring.datasource.username=${DB_USERNAME:newsradar}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 콘솔 비활성화
spring.h2.console.enabled=false

# PostgreSQL용 스크립트 실행 (H2 전용 data.sql 제외)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-postgresql.sql
spring.sql.init.data-locations=classpath:data-postgresql.sql

# 기본 프로필의 PgVector AutoConfiguration 제외를 해제 (빈 값으로 오버라이드)
spring.autoconfigure.exclude=

# PgVector 설정
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema-validation=false

# JWT — 프로덕션에서는 반드시 환경 변수로 주입 (기본값 없음 → 미설정 시 시작 실패)
app.jwt.secret=${JWT_SECRET}
